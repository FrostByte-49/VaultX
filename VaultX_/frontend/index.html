    <!-- Theme Initialization - Prevents Flash of Wrong Theme -->
    <script>
      (function () {
        try {
          // Check localStorage first, then system preference
          const saved = localStorage.getItem('vaultx-dark-mode');
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

          // Remove any existing theme class
          document.documentElement.classList.remove('dark');

          // Apply dark mode if saved as true OR (no saved preference and system prefers dark)
          if (saved === 'true' || (saved === null && prefersDark)) {
            document.documentElement.classList.add('dark');
          }

          // Log for debugging (remove in production)
          console.log('Theme initialized:', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        } catch (e) {
          console.error('Theme initialization error:', e);
        }
      })();
    </script>
